<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Semantic Tab Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="brand-copy">
          <h1>Tab Tidy</h1>
          <p id="statusText">AI 标签页整理</p>
        </div>
      </header>

      <div id="progressBar" class="progress" hidden>
        <div id="progressFill"></div>
      </div>

      <button id="settingsSummaryBtn" class="settings-summary" type="button" hidden>
        <span id="settingsSummaryText">当前窗口 · DeepSeek</span>
        <strong>调整</strong>
      </button>

      <section class="launch-panel">
        <div class="control-group">
          <div class="control-label">
            <span>范围</span>
          </div>

          <div class="choice-grid compact-choice-grid" data-choice-for="organizeMode">
            <button class="choice-card" type="button" data-value="current_window">
              <span class="button-label">当前窗口</span>
            </button>
            <button class="choice-card" type="button" data-value="consolidate_one_window">
              <span class="button-label">所有窗口</span>
            </button>
          </div>
        </div>

        <select id="organizeMode" class="native-select" aria-label="整理范围">
          <option value="current_window">只整理当前窗口</option>
          <option value="consolidate_one_window">合并并整理所有窗口</option>
        </select>

        <div class="control-group">
          <div class="control-label">
            <span>AI 服务</span>
          </div>

          <div class="segmented" data-choice-for="plannerProvider">
            <button type="button" data-value="fake"><span class="button-label">预览</span></button>
            <button type="button" data-value="deepseek"><span class="button-label">DeepSeek</span></button>
            <button type="button" data-value="gateway"><span class="button-label">AI 网关</span></button>
          </div>
        </div>

        <select id="plannerProvider" class="native-select" aria-label="整理助手">
          <option value="fake">本地预览</option>
          <option value="deepseek">DeepSeek</option>
          <option value="gateway">AI 网关</option>
        </select>

        <div id="gatewayFields" class="provider-fields">
          <div class="field inline-secret">
            <label for="gatewayApiKey">密钥</label>
            <input id="gatewayApiKey" type="password" autocomplete="off" placeholder="sk-..." />
          </div>
        </div>

        <div id="deepseekFields" class="provider-fields">
          <div class="field inline-secret">
            <label for="deepseekApiKey">密钥</label>
            <input id="deepseekApiKey" type="password" autocomplete="off" placeholder="sk-..." />
          </div>
        </div>

        <label id="rememberProviderKeysRow" class="mini-check">
          <input id="rememberProviderKeys" type="checkbox" />
          <span>
            <strong>记住密钥</strong>
            <small>否则只在本次使用</small>
          </span>
        </label>

        <details class="preferences-panel">
          <summary>
            <span>整理偏好</span>
            <small>页面摘要、自定义要求</small>
          </summary>

          <label class="switch-row emphasis-toggle">
            <span>
              <strong>参考页面短摘要</strong>
              <small>标题不够明确时更准</small>
            </span>
            <input id="ackSampling" type="checkbox" />
          </label>

          <div id="samplingRisk" class="risk" hidden>
            <strong>会读取页面文字摘要</strong>
            <p>只读取标题、描述、标题层级和一小段可见文字；不会读取密码、表单内容、Cookie、本地存储或完整 HTML。</p>
          </div>

          <div class="field prompt-field">
            <label for="customPrompt">自定义要求</label>
            <textarea
              id="customPrompt"
              rows="3"
              spellcheck="true"
              placeholder="例如：找工作、AI 论文、当前项目分开；拿不准的放到待确认。"
            ></textarea>
          </div>
        </details>
      </section>

      <details class="advanced-settings">
        <summary>更多选项</summary>

        <div id="targetWindowField" class="field" hidden>
          <label for="targetWindowMode">合并后放到</label>
          <select id="targetWindowMode">
            <option value="new_window">新窗口</option>
            <option value="current_window">当前窗口</option>
          </select>
        </div>

        <div class="field">
          <label for="existingGroupMode">已有分组</label>
          <select id="existingGroupMode">
            <option value="preserve_existing_groups">保留</option>
            <option value="dissolve_existing_groups">重新整理</option>
          </select>
        </div>

        <div class="field">
          <label for="reviewGroupMode">待确认标签页</label>
          <select id="reviewGroupMode">
            <option value="create_review_group">创建待确认分组</option>
            <option value="leave_review_ungrouped">保持未分组</option>
          </select>
        </div>

        <div class="field">
          <label for="undoTargetWindowMode">撤销后目标窗口</label>
          <select id="undoTargetWindowMode">
            <option value="leave_empty_target_window">保留空窗口</option>
            <option value="close_empty_created_target_window">关闭本次创建的空窗口</option>
          </select>
        </div>

        <div class="field">
          <label for="urlPrivacyMode">发送给 AI 的网址信息</label>
          <select id="urlPrivacyMode">
            <option value="title_only">只发标题</option>
            <option value="sanitized_url">精简网址</option>
            <option value="full_url">完整网址</option>
          </select>
        </div>

        <div class="field">
          <label for="pageContextMode">页面摘要范围</label>
          <select id="pageContextMode">
            <option value="off">关闭</option>
            <option value="active_tab_only">仅当前标签页</option>
            <option value="ambiguous_with_permission">只读取不确定页面</option>
            <option value="all_granted_origins">读取已授权站点</option>
          </select>
        </div>

        <div id="hostPermissionField" class="field" hidden>
          <label for="hostPermissionRequestMode">站点授权</label>
          <select id="hostPermissionRequestMode">
            <option value="never">整理时不弹授权</option>
            <option value="ask_per_origin">按站点询问</option>
            <option value="ask_for_all_visible_origins">一次授权可见站点</option>
          </select>
        </div>

        <div class="field">
          <label for="promptPreset">整理风格</label>
          <select id="promptPreset">
            <option value="conservative">稳妥</option>
            <option value="research">研究资料</option>
            <option value="project_work">项目工作</option>
            <option value="aggressive_cleanup">强力清理</option>
          </select>
        </div>

        <div class="field">
          <label for="gatewayModel">AI 模型</label>
          <select id="gatewayModel">
            <option value="gpt-5.5">gpt-5.5</option>
            <option value="claude-opus-4-8">claude-opus-4-8</option>
            <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
          </select>
        </div>

        <div class="field">
          <label for="gatewayThinkingIntensity">思考强度</label>
          <select id="gatewayThinkingIntensity">
            <option value="low">低</option>
            <option value="medium">中</option>
            <option value="high">高</option>
            <option value="ultra">超高</option>
          </select>
        </div>

        <div class="field">
          <label for="gatewayBaseUrl">AI 网关地址</label>
          <input id="gatewayBaseUrl" type="url" autocomplete="off" placeholder="http://127.0.0.1:8317/v1" />
        </div>

        <div class="field">
          <label for="deepseekModel">DeepSeek 模型</label>
          <input id="deepseekModel" type="text" autocomplete="off" />
        </div>

        <div class="toggles">
          <label class="checkbox-row">
            <input id="includePinnedTabs" type="checkbox" />
            <span>包含固定标签页</span>
          </label>
          <label class="checkbox-row">
            <input id="includeIncognitoTabs" type="checkbox" />
            <span>包含无痕标签页</span>
          </label>
          <label class="checkbox-row">
            <input id="collapseGroupsAfterApply" type="checkbox" />
            <span>应用后折叠分组</span>
          </label>
        </div>

        <div class="number-grid">
          <div class="field">
            <label for="minConfidenceToApply">最低置信度</label>
            <input id="minConfidenceToApply" type="number" min="0" max="1" step="0.05" />
          </div>
          <div class="field">
            <label for="maxTabsPerGroup">单组最大数量</label>
            <input id="maxTabsPerGroup" type="number" min="1" max="500" step="1" />
          </div>
        </div>
      </details>

      <div class="actions">
        <button id="analyzeBtn" class="primary-action" type="button"><span class="button-label">生成方案</span></button>
        <button id="cancelBtn" class="danger-action" type="button" hidden><span class="button-label">取消</span></button>
        <button id="applyBtn" type="button" disabled><span class="button-label">开始整理</span></button>
        <button id="undoBtn" type="button"><span class="button-label">撤销</span></button>
      </div>

      <section id="previewSection" class="preview" aria-live="polite" hidden>
        <div class="section-heading">
          <div>
            <p class="step-label">整理预览</p>
            <h2>即将创建的分组</h2>
          </div>
          <span id="previewCount" class="quiet-pill">待生成</span>
        </div>
        <div id="previewRoot" class="empty">还没有方案。</div>
        <details id="detailsRoot" hidden>
          <summary>诊断信息</summary>
          <pre id="detailsText"></pre>
        </details>
      </section>
    </main>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
