<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab Tidy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="brand-copy">
          <h1>Tab Tidy</h1>
          <p id="statusText">AI 标签页整理</p>
        </div>
        <button id="closeWindowBtn" class="window-close" type="button" aria-label="关闭窗口">
          <span aria-hidden="true">×</span>
        </button>
      </header>

      <div class="scroll-region">
        <section class="launch-panel">
          <div class="control-group">
            <div class="control-label">
              <span>范围</span>
            </div>

            <div class="choice-grid compact-choice-grid" data-choice-for="organizeMode">
              <button class="choice-card" type="button" data-value="current_window">
                <span class="button-label">当前窗口</span>
              </button>
              <button class="choice-card" type="button" data-value="consolidate_one_window">
                <span class="button-label">所有窗口</span>
              </button>
            </div>
          </div>

          <select id="organizeMode" class="native-select" aria-label="整理范围">
            <option value="current_window">只整理当前窗口</option>
            <option value="consolidate_one_window">合并并整理所有窗口</option>
          </select>

          <select id="plannerProvider" class="native-select" aria-hidden="true" tabindex="-1">
            <option value="gateway">AI</option>
            <option value="fake">Internal test</option>
          </select>

          <div class="preferences-panel">
            <label class="switch-row emphasis-toggle">
              <span>
                <strong>参考页面短摘要</strong>
                <small>标题不够明确时更准</small>
              </span>
              <input id="ackSampling" type="checkbox" />
            </label>

            <div id="samplingRisk" class="risk" hidden>
              <strong>会读取页面文字摘要</strong>
              <p>只读取标题、描述、标题层级和一小段可见文字；不会读取密码、表单内容、Cookie、本地存储或完整 HTML。</p>
            </div>

            <div class="field prompt-field">
              <label for="customPrompt">自定义要求</label>
              <textarea
                id="customPrompt"
                rows="3"
                spellcheck="true"
                placeholder="例如：找工作、AI 论文、当前项目分开；拿不准的先放到待分类。"
              ></textarea>
            </div>
          </div>
        </section>

        <details class="advanced-settings">
          <summary>更多选项</summary>

        <div id="targetWindowField" class="setting-toggle-field" hidden>
          <label class="switch-row compact-switch">
            <span>
              <strong>合并到当前窗口</strong>
              <small>关闭时会新开一个窗口</small>
            </span>
            <input id="targetWindowCurrentToggle" type="checkbox" />
          </label>
          <select id="targetWindowMode" class="setting-source" aria-hidden="true" tabindex="-1" hidden>
            <option value="new_window">新窗口</option>
            <option value="current_window">当前窗口</option>
          </select>
        </div>

        <div class="setting-toggle-field">
          <label class="switch-row compact-switch">
            <span>
              <strong>重新整理已有分组</strong>
              <small>关闭时保留现有分组</small>
            </span>
            <input id="dissolveExistingGroupsToggle" type="checkbox" />
          </label>
          <select id="existingGroupMode" class="setting-source" aria-hidden="true" tabindex="-1" hidden>
            <option value="preserve_existing_groups">保留</option>
            <option value="dissolve_existing_groups">重新整理</option>
          </select>
        </div>

        <div class="setting-toggle-field">
          <label class="switch-row compact-switch">
            <span>
              <strong>拿不准的单独待分类</strong>
              <small>关闭时保持不分组</small>
            </span>
            <input id="createReviewGroupToggle" type="checkbox" />
          </label>
          <select id="reviewGroupMode" class="setting-source" aria-hidden="true" tabindex="-1" hidden>
            <option value="create_review_group">单独放到待分类</option>
            <option value="leave_review_ungrouped">保持不分组</option>
          </select>
        </div>

        <div class="setting-toggle-field">
          <label class="switch-row compact-switch">
            <span>
              <strong>撤销后关闭空窗口</strong>
              <small>关闭时保留空窗口</small>
            </span>
            <input id="closeEmptyTargetWindowToggle" type="checkbox" />
          </label>
          <select id="undoTargetWindowMode" class="setting-source" aria-hidden="true" tabindex="-1" hidden>
            <option value="leave_empty_target_window">保留空窗口</option>
            <option value="close_empty_created_target_window">关闭本次创建的空窗口</option>
          </select>
        </div>

        <div class="field">
          <label for="urlPrivacyMode">发送给 AI 的网址信息</label>
          <select id="urlPrivacyMode">
            <option value="title_only">只发标题</option>
            <option value="sanitized_url">精简网址</option>
            <option value="full_url">完整网址</option>
          </select>
        </div>

        <div class="field">
          <label for="pageContextMode">页面摘要范围</label>
          <select id="pageContextMode">
            <option value="off">关闭</option>
            <option value="ambiguous_with_permission">只读取不确定页面</option>
            <option value="all_granted_origins">尽量读取可授权页面</option>
          </select>
        </div>

        <div id="hostPermissionField" class="field" hidden>
          <label for="hostPermissionRequestMode">站点授权</label>
          <select id="hostPermissionRequestMode">
            <option value="never">整理时不弹授权</option>
            <option value="ask_per_origin">按站点询问</option>
            <option value="ask_for_all_visible_origins">一次授权可见站点</option>
          </select>
        </div>

        <div class="field">
          <label for="languageMode">结果语言</label>
          <select id="languageMode">
            <option value="auto">自动判断</option>
            <option value="zh-CN">简体中文</option>
            <option value="en-US">English</option>
          </select>
        </div>

        <div class="field">
          <label for="promptPreset">整理风格</label>
          <select id="promptPreset">
            <option value="conservative">稳妥</option>
            <option value="research">研究资料</option>
            <option value="project_work">项目工作</option>
            <option value="aggressive_cleanup">强力清理</option>
          </select>
        </div>

        <div class="field">
          <label for="gatewayModel">AI 模型</label>
          <select id="gatewayModel">
            <option value="gpt-5.5">gpt-5.5</option>
            <option value="claude-opus-4-8">claude-opus-4-8</option>
            <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
          </select>
        </div>

        <div class="field">
          <label for="gatewayThinkingIntensity">思考强度</label>
          <select id="gatewayThinkingIntensity">
            <option value="low">低</option>
            <option value="medium">中</option>
            <option value="high">高</option>
            <option value="ultra">超高</option>
          </select>
        </div>

        <div class="field">
          <label for="gatewayBaseUrl">AI 网关地址（可选）</label>
          <input id="gatewayBaseUrl" type="url" autocomplete="off" placeholder="不填则使用默认服务" />
        </div>

        <div class="field">
          <label for="gatewayApiKey">AI 网关密钥（可选）</label>
          <input id="gatewayApiKey" type="password" autocomplete="off" placeholder="默认服务无需填写" />
        </div>

        <div class="toggles">
          <label class="switch-row compact-switch">
            <span>
              <strong>包含固定标签页</strong>
              <small>会参与移动和分组</small>
            </span>
            <input id="includePinnedTabs" type="checkbox" />
          </label>
          <label class="switch-row compact-switch">
            <span>
              <strong>包含无痕标签页</strong>
              <small>只在浏览器允许时生效</small>
            </span>
            <input id="includeIncognitoTabs" type="checkbox" />
          </label>
          <label class="switch-row compact-switch">
            <span>
              <strong>整理后收起分组</strong>
              <small>新分组默认折叠</small>
            </span>
            <input id="collapseGroupsAfterApply" type="checkbox" />
          </label>
        </div>

        <div class="number-grid">
          <div class="field">
            <label for="minConfidenceToApply">最低置信度</label>
            <input id="minConfidenceToApply" type="number" min="0" max="1" step="0.05" />
          </div>
          <div class="field">
            <label for="maxTabsPerGroup">单组最大数量</label>
            <input id="maxTabsPerGroup" type="number" min="1" max="500" step="1" />
          </div>
        </div>
        </details>

        <section id="previewSection" class="preview" aria-live="polite" hidden>
          <div class="section-heading">
            <div>
              <p class="step-label">整理预览</p>
              <h2>即将创建的分组</h2>
            </div>
            <span id="previewCount" class="quiet-pill">待生成</span>
          </div>
          <div id="previewRoot" class="empty">还没有方案。</div>
          <details id="detailsRoot" hidden>
            <summary>诊断信息</summary>
            <pre id="detailsText"></pre>
          </details>
        </section>
      </div>

      <div class="actions">
        <div id="progressBar" class="task-progress" hidden>
          <div class="task-progress-meta">
            <span id="progressLabel">正在准备整理</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div class="progress-track">
            <div id="progressFill"></div>
          </div>
        </div>
        <button id="analyzeBtn" class="primary-action" type="button"><span class="button-label">生成方案</span></button>
        <button id="cancelBtn" class="danger-action" type="button" hidden><span class="button-label">取消</span></button>
        <button id="applyBtn" type="button" disabled><span class="button-label">开始整理</span></button>
        <button id="undoBtn" type="button"><span class="button-label">撤销</span></button>
      </div>

    </main>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
