name = "tab-tidy-gateway"
main = "src/index.js"
compatibility_date = "2026-06-24"
workers_dev = false

routes = [
  { pattern = "cliproxy.sylvanyu.io/*", zone_name = "sylvanyu.io" }
]

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a392f7d94e1e42aebe25f7725b43f9c4"

[vars]
ALLOWED_MODELS = "gpt-5.5,gpt-5.4,gpt-5.4-mini,codex-auto-review,claude-fable-5,claude-opus-4-8,claude-opus-4-7,claude-opus-4-6,claude-opus-4-5-20251101,claude-opus-4-1-20250805,claude-opus-4-20250514,claude-sonnet-4-6,claude-sonnet-4-5-20250929,claude-sonnet-4-20250514,claude-haiku-4-5-20251001,claude-3-7-sonnet-20250219,claude-3-5-haiku-20241022,gpt-5.3-codex-spark"
MAX_BODY_BYTES = "1000000"
MAX_TOKENS = "8192"
IP_HOURLY_REQUESTS = "60"
INSTALL_DAILY_REQUESTS = "100"
INSTALL_DAILY_PAGE_SUMMARY_REQUESTS = "20"
GLOBAL_DAILY_REQUESTS = "3000"
